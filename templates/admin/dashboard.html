{% extends "admin/_layout.html" %}

{% block title %}Tableau de bord — Sésame{% endblock %}

{% block admin_content %}
<div class="page-head">
  <h1>Tableau de bord</h1>
</div>

<div class="stats">
  <div class="stat">
    <div class="label">Questions</div>
    <div class="value">{{ nb_questions }}</div>
  </div>
  <div class="stat">
    <div class="label">Matières</div>
    <div class="value">{{ nb_subjects }}</div>
  </div>
  <div class="stat">
    <div class="label">Contrôles passés</div>
    <div class="value">{{ nb_attempts }}</div>
  </div>
</div>
{% endblock %}
