# kidgate — fichier de configuration
#
# Ici ne vivent QUE les valeurs qui exigent un redémarrage. Tout le reste — durée
# de session, budget quotidien, seuil de réussite, difficulté, plages horaires —
# vit dans la base de données, PAR ENFANT, et se modifie depuis /admin sans
# redémarrer.

[server]
# 0.0.0.0 = écoute sur toutes les interfaces réseau (le parent peut ouvrir
# /admin depuis un autre appareil). Utilise "127.0.0.1" pour limiter l'accès à
# la machine locale.
host = "0.0.0.0"
port = 0  # 0 = port aléatoire choisi par le système

[paths]
# Base de données SQLite. Un chemin relatif est résolu vers
# $XDG_DATA_HOME/kidgate (et NON vers le répertoire courant).
database = "questions.db"
