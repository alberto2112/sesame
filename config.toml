# sesame — fichier de configuration
#
# Ici ne vivent QUE les valeurs qui exigent un redémarrage. Tout le reste —
# durée de session, budget quotidien, seuil de réussite, difficulté, plages
# horaires — vit dans la base de données, PAR ENFANT, et se modifie depuis
# /admin sans redémarrer.

[server]
# 0.0.0.0 = écoute sur toutes les interfaces (le parent peut ouvrir /admin
# depuis un autre appareil). "127.0.0.1" limite l'accès à cette machine.
host = "0.0.0.0"

# Le port doit être FIXE : le kiosque, le minuteur et la fenêtre de
# verrouillage sont des clients qui doivent savoir où frapper.
port = 7654

[paths]
# Base de données SQLite. Un chemin relatif est résolu vers
# $XDG_DATA_HOME/sesame (et NON vers le répertoire courant).
database = "questions.db"

[kiosk]
# Navigateur utilisé par sesame-kiosk pour afficher le contrôle en plein écran.
# Commenté = détection automatique (chromium, chrome, brave, firefox…), avec
# les bons arguments : plein écran, navigation privée, et la clé Wayland.
#
# Si tu précises TON navigateur, sesame n'ajoute plus rien : c'est à toi de
# mettre cette clé. Le kiosque tourne dans `cage`, un compositeur Wayland — un
# navigateur qui part chercher un serveur X ne trouvera personne, et l'enfant
# aura un écran noir.
#
#   Chromium : browser = "chromium --kiosk --ozone-platform=wayland"
#   Firefox  : browser = "firefox --kiosk"   + MOZ_ENABLE_WAYLAND=1 dans
#              l'environnement (les versions récentes la devinent seules)
#
# browser = "chromium --kiosk --ozone-platform=wayland"
